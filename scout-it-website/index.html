<!doctype html>
<html lang="en">
  <head>
    <script>
      // Theme bootstrap — runs before paint to prevent flash.
      // Falls back to OS preference when the user hasn't chosen explicitly.
      (function () {
        try {
          var stored = localStorage.getItem('scout-it-theme')
          var t = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          document.documentElement.dataset.theme = t
          document.documentElement.style.colorScheme = t
        } catch (e) {
          /* storage unavailable — stay light */
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf9f5" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="/scout-it-mark.svg" />
    <link rel="sitemap" href="/sitemap.xml" />
    <title>scout-it — the search & extraction toolkit for terminals and agents</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
